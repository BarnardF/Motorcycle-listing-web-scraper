# .github/workflows/sunday-tracker.yml
# Runs every Sunday at 5:00 AM SAST (03:00 UTC)
# 1. Refreshes ZABikers cache
# 2. Refreshes WeBuyCars cache
# 3. Runs the full motorcycle tracker
# 4. Commits updates only if files changed
# 5. Uploads logs & cache backups for debugging

name: Sunday Motorcycle Tracker

on:
  schedule:
    # 5:00 AM SAST = 03:00 UTC
    - cron: "0 3 * * 0"
  workflow_dispatch:

jobs:
  sunday-tracking:
    runs-on: ubuntu-latest

    steps:
      # --------------------------------------------------
      # Checkout
      # --------------------------------------------------
      - name: Checkout code
        uses: actions/checkout@v4

      # --------------------------------------------------
      # Ensure data folder exists
      # --------------------------------------------------
      - name: Create data folder
        run: mkdir -p data

      # --------------------------------------------------
      # Python setup
      # --------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install

      # --------------------------------------------------
      # STEP 1 — Refresh ZABikers cache
      # --------------------------------------------------
      - name: Refresh ZABikers cache
        run: python cache_zabikers.py

      - name: Verify ZABikers cache file exists
        run: |
          if [ ! -f data/zabikers_cache.json ]; then
            echo "ZABikers cache file not created"
            exit 1
          fi
          
          size=$(stat -c%s data/zabikers_cache.json 2>/dev/null || stat -f%z data/zabikers_cache.json 2>/dev/null)
          echo "✓ ZABikers cache file created: $size bytes"

      - name: Commit ZABikers cache updates (if changed)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add data/zabikers_cache.json
          
          if git diff --quiet --cached; then
            echo "✓ ZABikers cache unchanged — skipping commit"
          else
            echo "✓ ZABikers cache updated — committing changes"
            git commit -m "Auto-refresh ZABikers cache - Sunday [$(TZ='Africa/Johannesburg' date +'%d-%m-%Y %H:%M:%S SAST')]"
            git push
          fi

      # --------------------------------------------------
      # STEP 2 — Refresh WeBuyCars cache
      # --------------------------------------------------
      - name: Refresh WeBuyCars cache
        run: python cache_webuycars.py

      - name: Verify WeBuyCars cache file exists
        run: |
          if [ ! -f data/webuycars_cache.json ]; then
            echo "WeBuyCars cache file not created"
            exit 1
          fi
          
          size=$(stat -c%s data/webuycars_cache.json 2>/dev/null || stat -f%z data/webuycars_cache.json 2>/dev/null)
          echo "✓ WeBuyCars cache file created: $size bytes"

      - name: Commit WeBuyCars cache updates (if changed)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          git add data/webuycars_cache.json
          
          if git diff --quiet --cached; then
            echo "✓ WeBuyCars cache unchanged — skipping commit"
          else
            echo "✓ WeBuyCars cache updated — committing changes"
            git commit -m "Auto-refresh WeBuyCars cache - Sunday [$(TZ='Africa/Johannesburg' date +'%d-%m-%Y %H:%M:%S SAST')]"
            git push
          fi

      # --------------------------------------------------
      # STEP 3 — Run full tracker
      # --------------------------------------------------
      - name: Run motorcycle tracker
        run: python main.py

      - name: Commit tracker updates (if changed)
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"

          # Force add the files (don't rely on git diff, it's unreliable)
          git add -f docs/index.html
          git add -f data/listings.db
          
          git add -f data/summary.json
          
          # Check if there are staged changes
          if git diff --quiet --cached; then
            echo "✓ No changes to commit"
          else
            echo "✓ Updates detected — committing changes"
            git commit -m "Auto-update listings - Sunday [$(TZ='Africa/Johannesburg' date +'%d-%m-%Y %H:%M:%S SAST')]"
            git push
          fi

      # --------------------------------------------------
      # STEP 4 — Upload logs for debugging
      # --------------------------------------------------
      - name: Upload execution logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: sunday-tracker-logs
          path: tracker.log
          retention-days: 30

      - name: Upload ZABikers cache backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: zabikers-cache-backup
          path: data/zabikers_cache.json
          retention-days: 30

      - name: Upload WeBuyCars cache backup
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: webuycars-cache-backup
          path: data/webuycars_cache.json
          retention-days: 30